name: Fetch Jobs Daily

on:
  schedule:
    - cron: '0 6 * * *'  # כל יום ב-06:00 UTC (09:00 ישראל)
  workflow_dispatch:       # אפשרות להרצה ידנית מ-GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 psycopg2-binary

      - name: Run fetch jobs script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python python/main.py